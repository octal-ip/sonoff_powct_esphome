substitutions:
  ct_turns_b: "1"        # Number of times the conductor is wrapped through the CT (1-5)
  persist_energy: "false" # Set to true to save accumulated energy to flash (survives reboot or power outage)
  current_gain_a: "1.048" # Gain correction multiplier for channel A current (and derived power), default 1.0 means no correction. Adjust if you find the readings are consistently off by a certain percentage.

esphome:
  name: esphome-powct
  friendly_name: ESPHome-POWCT
  name_add_mac_suffix: false

esp32:
  board: nodemcu-32s
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

preferences:
  flash_write_interval: 1h

logger:
   level: INFO

api:
  reboot_timeout: 5min
  homeassistant_services: True
  services:
    - service: read_register
      variables:
        register_number: string
        size: int
      then:
        - lambda: |-
            id(cse7761_comp).read_register_service(register_number, size);
    - service: write_register
      variables:
        register_number: string
        regiter_value: string
      then:
        - lambda: |-
            id(cse7761_comp).write_register_service(register_number, regiter_value);

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  ota: false
  log: false
  local: true
  version: 3

captive_portal:

time:
  - platform: homeassistant
    id: homeassistant_time

external_components:
  - source: my_components
    components: [cse7761]

uart:
  tx_pin: GPIO26
  rx_pin: GPIO25
  baud_rate: 38400
  parity: EVEN
  stop_bits: 1

# Debug text_sensor : cse7761 register access
text_sensor:
  - platform: template
    id: read_register_debug_hex
    name: "CSE7761 Read Register (hex)"
    entity_category: diagnostic
  - platform: template
    id: read_register_debug_bin
    name: "CSE7761 Read Register (binary)"
    entity_category: diagnostic
    
sensor:
  - platform: cse7761
    id: cse7761_comp
    update_interval: 500ms
    ct_turns: ${ct_turns}
    persist_energy: ${persist_energy}
    current_gain_a: ${current_gain_a}
    debug_sensor_hex_id: read_register_debug_hex
    debug_sensor_bin_id: read_register_debug_bin
    voltage:
      name: Voltage
      id: v_sensor
      icon: mdi:sine-wave
      filters:
        - throttle_average: 30s
    current_1:
      name: Current A
      id: a_sensor_1
      accuracy_decimals: 3
      icon: mdi:current-ac
      filters:
        - throttle_average: 30s
    active_power_1:
      name: Power A
      id: w_sensor_1
      icon: mdi:flash
      filters:
        - throttle_average: 30s
      on_value_range:
        - above: 4.0
          then:
            - light.turn_on: switch_led
        - below: 3.0
          then:
            - light.turn_off: switch_led
    energy_received:
      name: Energy received
      id: E_received
      icon: mdi:lightning-bolt
      accuracy_decimals: 3
      state_class: total_increasing
      filters:
        - throttle: 30s
    energy_exported:
      name: Energy exported
      id: E_exported
      icon: mdi:lightning-bolt
      accuracy_decimals: 3
      state_class: total_increasing
      filters:
        - throttle: 30s
    power_factor:
      name: Power Factor
      id: power_factor
      icon: mdi:angle-acute
      filters:
        - throttle_average: 30s
    reactive_power:
      name: Reactive Power
      id: q_sensor
      icon: mdi:flash-outline
      filters:
        - throttle_average: 30s

  - platform: internal_temperature
    name: ESP32 Internal Temp
    id: esp32_temp
    update_interval: 60s

binary_sensor:
  - platform: gpio
    pin: GPIO00
    id: reset
    internal: true
    filters:
      - invert:
      - delayed_off: 10ms
    on_click:
      - max_length: 350ms # short press to toggle the relay
        then:
          switch.toggle: relay_1
      - min_length: 360ms # long press to cycle display info
        max_length: 3s
        then:
          - if:
              condition:
                binary_sensor.is_on: page
              then:
                binary_sensor.template.publish:
                  id: page
                  state: OFF
              else:
                binary_sensor.template.publish:
                  id: page
                  state: ON
  - platform: template # this is a fake sensor to tell the screen which info to show on display
    id: page
    publish_initial_state: true
    internal: true

display:
  platform: tm1621
  id: tm1621_display
  cs_pin: GPIO17
  data_pin: GPIO05
  read_pin: GPIO23
  write_pin: GPIO18
  update_interval: 500ms
  lambda: |-
    if (id(page).state) {
      it.display_voltage(true);
      it.display_kwh(false);
      it.printf(0, "%.1f", id(v_sensor).raw_state);
      it.printf(1, "%.1f", id(a_sensor_1).raw_state);
    } else {
      it.display_voltage(false);
      it.display_kwh(true);
      { float _er = id(E_received).raw_state;
        float _ee = id(E_exported).raw_state;
        float _e = (std::isnan(_er) ? 0.0f : _er) - (std::isnan(_ee) ? 0.0f : _ee);
        it.printf(0, "%.1f", _e); }
      { float _w = id(w_sensor_1).raw_state;
        if (fabsf(_w) >= 1000.0f)  it.printf(1, "%.1f", _w / 1000.0f);  // kW with decimal
        else                       it.printf(1, "%.0f", _w); }           // W no decimal
    }

output:
  - platform: ledc
    id: led
    pin:
      number: GPIO13
      inverted: False

switch:
  - platform: template
    name: Zero Point Calibration Mode
    id: cse7761_calibration_switch
    icon: mdi:ruler
    lambda: 'return id(cse7761_comp).is_calibration_enabled();'
    turn_on_action:
      - lambda: 'id(cse7761_comp).set_calibration_mode(true);'
    turn_off_action:
      - lambda: 'id(cse7761_comp).set_calibration_mode(false);'
  - platform: gpio
    name: Relay
    pin: GPIO21
    id: relay_1
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - delay: 500ms
      - light.turn_on: switch_led
    on_turn_off:
      - delay: 500ms
      - light.turn_off: switch_led

light:
  - platform: monochromatic
    id: switch_led
    output: led
    internal: True
  - platform: status_led
    id: wifi_status_led
    internal: True
    pin:
      number: GPIO15
      inverted: True

